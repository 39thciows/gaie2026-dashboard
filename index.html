const ZONES  = [{"color": "#8e44ad", "en": "Embodied Intelligence & Humanoid Robots", "zh": "具身智能及人形机器人"}, {"color": "#27ae60", "en": "Next-Gen AI Terminal Devices", "zh": "新一代人工智能终端"}, {"color": "#2980b9", "en": "Foundation Models & Industry Solutions", "zh": "大模型及行业应用"}, {"color": "#c0392b", "en": "International Exhibition Zone", "zh": "国际展区"}, {"color": "#16a085", "en": "Smart Digital City", "zh": "数智城市"}, {"color": "#7f8c8d", "en": "Innovation & Entrepreneurship", "zh": "创新创业"}, {"color": "#d68910", "en": "Conference Rooms / VIP", "zh": "会议室 / VIP"}, {"color": "#e67e22", "en": "Special Activity Zones", "zh": "特殊展区"}];

// Virtual canvas matches ~PDF aspect 3370:2384 → use 1000:707
const VW = 1000, VH = 707;

let zoom = 1, panX = 0, panY = 0;
let showLabels = true; // always on
let highlighted = new Set();
let activeQ = '';

const svg    = document.getElementById('map-svg');
const mapWrap= document.getElementById('mapWrap');

// ── INIT SVG SIZE ──────────────────────────────────────────────────
function initSVG() {
  svg.setAttribute('width',  mapWrap.clientWidth);
  svg.setAttribute('height', mapWrap.clientHeight);
}

// ── COORDINATE HELPERS ─────────────────────────────────────────────
function p(b) {
  return {
    x:  b.x  / 100 * VW,
    y:  b.y  / 100 * VH,
    x2: b.x2 / 100 * VW,
    y2: b.y2 / 100 * VH,
    cx: (b.x+b.x2)/2/100*VW,
    cy: (b.y+b.y2)/2/100*VH,
    w:  (b.x2-b.x)/100*VW,
    h:  (b.y2-b.y)/100*VH,
  };
}

// ── RENDER ─────────────────────────────────────────────────────────
function render() {
  svg.innerHTML = '';

  // Floor background
  const bg = el('rect', {x:0,y:0,width:VW,height:VH,fill:'#f8f6f0',stroke:'#bbb','stroke-width':1});
  svg.appendChild(bg);

  // Hall label
  const hallLbl = el('text',{x:8,y:18,'font-size':'14','font-weight':'700',fill:'#c0392b',
    'font-family':'Segoe UI,Helvetica Neue,Arial,sans-serif','letter-spacing':'0.05em'});
  hallLbl.textContent='HALL 1';
  svg.appendChild(hallLbl);

  BOOTHS.forEach(b => {
    const pp = p(b);
    const isLit = highlighted.has(b.id);
    const isDim = highlighted.size > 0 && !isLit;
    const alpha = isDim ? '22' : 'cc';  // hex alpha

    // ── Booth rectangle ───────────────────────────────────────────
    const rect = el('rect', {
      x: pp.x, y: pp.y,
      width:  Math.max(pp.w, 8),
      height: Math.max(pp.h, 8),
      fill:   b.color + (isDim ? '18' : '22'),
      stroke: b.color + (isDim ? '44' : 'bb'),
      'stroke-width': isLit ? 2.5 : 1,
      rx: 2,
    });
    if (isLit) {
      rect.setAttribute('filter', 'drop-shadow(0 0 3px ' + b.color + '88)');
    }
    rect.style.cursor = 'pointer';
    rect.addEventListener('click',       () => clickBooth(b));
    rect.addEventListener('mouseenter',  e  => showTT(e, b));
    rect.addEventListener('mousemove',   e  => moveTT(e));
    rect.addEventListener('mouseleave',  hideTT);
    svg.appendChild(rect);

    const textAlpha = isDim ? '0.25' : '1';

    // ── Booth ID (tiny, top-left) ─────────────────────────────────
    const idT = el('text', {
      x: pp.x + 2.5, y: pp.y + 5.5,
      'font-size': Math.min(pp.h * 0.13, 4.5),
      'font-family': 'Consolas,Courier New,monospace',
      fill: '#666', opacity: isDim ? 0.2 : 0.7,
    });
    idT.style.pointerEvents = 'none';
    idT.textContent = b.id;
    svg.appendChild(idT);

    // ── Chinese text (upper portion of booth) ────────────────────
    const zhLines = b.zh.split('\n');
    const enLines = b.en.split('\n');
    const totalSegs = zhLines.length + enLines.length;
    const segH = Math.min(pp.h / (totalSegs + 0.5), pp.h * 0.38);
    const zhFs = Math.min(segH * 0.82, pp.w * 0.18, 7.5);
    const enFs = Math.min(segH * 0.72, pp.w * 0.15, 6.5);

    // vertical layout: split box into top half (zh) and bottom half (en)
    const zhAreaCy = pp.y + pp.h * 0.35;
    const enAreaCy = pp.y + pp.h * 0.70;

    zhLines.forEach((line, i) => {
      const yPos = zhAreaCy + (i - (zhLines.length-1)/2) * (zhFs * 1.3);
      const t = el('text', {
        x: pp.cx, y: yPos,
        'font-size': Math.max(zhFs, 3),
        'font-weight': '700',
        'font-family': 'Microsoft YaHei,PingFang SC,Noto Sans CJK SC,sans-serif',
        fill: '#1a1612',
        opacity: textAlpha,
        'text-anchor': 'middle',
        'dominant-baseline': 'middle',
      });
      t.style.pointerEvents = 'none';
      t.textContent = line;
      svg.appendChild(t);
    });

    // ── English text (lower portion, yellow highlight) ────────────
    if (showLabels) { enLines.forEach((line, i) => {
      const yPos = enAreaCy + (i - (enLines.length-1)/2) * (enFs * 1.3);
      // Yellow pill background
      const textW = line.length * enFs * 0.58;
      const bgR = el('rect', {
        x: pp.cx - textW/2 - 1.5,
        y: yPos - enFs * 0.7,
        width:  textW + 3,
        height: enFs * 1.35,
        fill: '#fde68a',
        rx: 1,
        opacity: isDim ? 0.15 : 0.9,
      });
      bgR.style.pointerEvents = 'none';
      svg.appendChild(bgR);

      const t = el('text', {
        x: pp.cx, y: yPos,
        'font-size': Math.max(enFs, 2.8),
        'font-weight': '600',
        'font-family': 'Segoe UI,Helvetica Neue,Arial,sans-serif',
        fill: '#1a1200',
        opacity: textAlpha,
        'text-anchor': 'middle',
        'dominant-baseline': 'middle',
      });
      t.style.pointerEvents = 'none';
      t.textContent = line;
      svg.appendChild(t);
    }); }  // end if (showLabels)
  });

  applyTransform();
  window._sbN =
    highlighted.size > 0 ? `Selected: ${highlighted.size}` : `Booths: ${BOOTHS.length}`;
}

function el(tag, attrs) {
  const e = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k,v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

// ── TRANSFORM ─────────────────────────────────────────────────────
function applyTransform() {
  svg.setAttribute('viewBox', `${panX} ${panY} ${VW/zoom} ${VH/zoom}`);
  window._sbZoom = `Zoom: ${Math.round(zoom*100)}%`;
}

function fitView() {
  zoom=1; panX=0; panY=0; applyTransform();
}
function resetZoom() { fitView(); }

// ── ZOOM (scroll) ──────────────────────────────────────────────────
mapWrap.addEventListener('wheel', e => {
  e.preventDefault();
  const rect  = mapWrap.getBoundingClientRect();
  const mx = (e.clientX - rect.left) / rect.width  * (VW/zoom) + panX;
  const my = (e.clientY - rect.top)  / rect.height * (VH/zoom) + panY;
  const f  = e.deltaY < 0 ? 1.13 : 0.88;
  zoom = Math.max(0.4, Math.min(25, zoom*f));
  panX = mx - (e.clientX - rect.left) / rect.width  * (VW/zoom);
  panY = my - (e.clientY - rect.top)  / rect.height * (VH/zoom);
  applyTransform();
}, {passive:false});

// ── PAN (drag) ─────────────────────────────────────────────────────
((() => {
  let drag=false, sx,sy,spx,spy;
  mapWrap.addEventListener('mousedown', e => {
    if (e.target.tagName === 'rect' && e.target !== svg.firstChild) return;
    drag=true; sx=e.clientX; sy=e.clientY; spx=panX; spy=panY;
    mapWrap.classList.add('dragging');
  });
  window.addEventListener('mouseup', () => { drag=false; mapWrap.classList.remove('dragging'); });
  mapWrap.addEventListener('mousemove', e => {
    if (!drag) return;
    const rect = mapWrap.getBoundingClientRect();
    panX = spx - (e.clientX-sx)/rect.width  * (VW/zoom);
    panY = spy - (e.clientY-sy)/rect.height * (VH/zoom);
    applyTransform();
  });
})());

// ── TOOLTIP ────────────────────────────────────────────────────────
const tooltip = {style:{display:'none'},querySelector:()=>{}};
function showTT(e, b) {
  window._ttId = b.id;
  window._ttZh = b.zh;
  window._ttEn = b.en;
  // tooltip removed
  moveTT(e);
}
function moveTT(e) {
  // tooltip removed
  // tooltip removed
}
function hideTT() {}

// ── CLICK BOOTH ────────────────────────────────────────────────────
function clickBooth(b) {
  if (highlighted.has(b.id)) highlighted.delete(b.id);
  else highlighted.add(b.id);
  render();
  updateSidebar();
  if (highlighted.has(b.id)) zoomTo(b);
}

function zoomTo(b) {
  const pp = p(b);
  const pad = 60;
  zoom = Math.min(12, Math.max(zoom, 6));
  panX = pp.cx - (VW/zoom)/2;
  panY = pp.cy - (VH/zoom)/2;
  applyTransform();
}

function toggleLabels() {
  showLabels = !showLabels;
  const btn = ({textContent:'',classList:{toggle:()=>{}}});
  btn.textContent = showLabels ? 'EN labels ✓' : 'EN labels ✗';
  btn.classList.toggle('on', showLabels);
  render();
}

function clearHighlight() {
  highlighted.clear();
  activeQ = '';
  document.getElementById('search').value = '';
  document.getElementById('match-count').textContent = '';
  render();
  showDefaultSidebar();
}

// ── SEARCH ─────────────────────────────────────────────────────────
const searchEl    = {addEventListener:()=>{}, value:'', focus:()=>{}, select:()=>{}};
const resultList  = {innerHTML:'', appendChild:()=>{}};
const matchCount  = {textContent:''};

// search removed

// keydown removed

function doSearch(q) {
  activeQ = q.trim().toLowerCase();
  highlighted.clear();
  if (!activeQ) { render(); showDefaultSidebar(); matchCount.textContent=''; return; }
  const hits = BOOTHS.filter(b =>
    b.id.toLowerCase().includes(activeQ) ||
    b.zh.toLowerCase().includes(activeQ) ||
    b.en.toLowerCase().includes(activeQ)
  );
  hits.forEach(b => highlighted.add(b.id));
  matchCount.textContent = hits.length ? hits.length+' found' : 'No results';
  render();
  renderResultList(hits);
  if (hits.length===1) zoomTo(hits[0]);
}

function renderResultList(items) {
  resultList.innerHTML = '';
  if (!items.length) {
    resultList.innerHTML = '<div class="r-empty">No booths matched your search.</div>';
    return;
  }
  items.forEach(b => {
    const d = document.createElement('div');
    d.className = 'r-item' + (highlighted.has(b.id) ? ' active' : '');
    d.innerHTML = `<div class="r-dot" style="background:${b.color}"></div>
      <div class="r-texts">
        <div class="r-id">${b.id}</div>
        <div class="r-zh">${b.zh}</div>
        <div class="r-en">${b.en}</div>
      </div>`;
    d.addEventListener('click', () => { highlighted.add(b.id); render(); zoomTo(b); });
    resultList.appendChild(d);
  });
}

function updateSidebar() {
  if (!activeQ && highlighted.size) {
    const sel = BOOTHS.filter(b => highlighted.has(b.id));
    renderResultList(sel);
  }
}

function showDefaultSidebar() {
  resultList.innerHTML = '<div class="r-empty"><strong>Ctrl+F</strong> or type above to search.<br><br>Click any booth on the map to select it.</div>';
}

// ── LEGEND ─────────────────────────────────────────────────────────
function buildLegend() {
  const grid = document.getElementById('legendGrid');
  ZONES.forEach(z => {
    const d = document.createElement('div');
    d.className = 'l-item';
    d.innerHTML = `<div class="l-swatch" style="background:${z.color}"></div><span>${z.en}</span>`;
    d.title = z.zh;
    d.addEventListener('click', () => {
      clearHighlight();
      BOOTHS.filter(b=>b.color===z.color).forEach(b=>highlighted.add(b.id));
      render();
      renderResultList(BOOTHS.filter(b=>highlighted.has(b.id)));
    });
    grid.appendChild(d);
  });
}

// ── INIT ───────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  initSVG(); render(); buildLegend(); fitView();
});
window.addEventListener('resize', () => { initSVG(); applyTransform(); });

// ── TOUCH: pinch-zoom + pan ────────────────────────────────────────
(function() {
  var lastDist = null;
  var lastMidX, lastMidY;
  var lastTx, lastTy;
  var touching = false;

  mapWrap.addEventListener('touchstart', function(e) {
    if (e.touches.length === 2) {
      lastDist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      lastMidX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      lastMidY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    } else if (e.touches.length === 1) {
      touching = true;
      lastTx = e.touches[0].clientX;
      lastTy = e.touches[0].clientY;
    }
    e.preventDefault();
  }, {passive: false});

  mapWrap.addEventListener('touchmove', function(e) {
    var rect = mapWrap.getBoundingClientRect();
    if (e.touches.length === 2 && lastDist !== null) {
      var dist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      var midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      var midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      // zoom around midpoint
      var mx = (midX - rect.left) / rect.width  * (VW/zoom) + panX;
      var my = (midY - rect.top)  / rect.height * (VH/zoom) + panY;
      var f = dist / lastDist;
      zoom = Math.max(0.5, Math.min(25, zoom * f));
      panX = mx - (midX - rect.left) / rect.width  * (VW/zoom);
      panY = my - (midY - rect.top)  / rect.height * (VH/zoom);
      // also pan with midpoint movement
      panX -= (midX - lastMidX) / rect.width  * (VW/zoom);
      panY -= (midY - lastMidY) / rect.height * (VH/zoom);
      lastDist = dist;
      lastMidX = midX; lastMidY = midY;
      applyTransform();
    } else if (e.touches.length === 1 && touching) {
      var dx = e.touches[0].clientX - lastTx;
      var dy = e.touches[0].clientY - lastTy;
      panX -= dx / rect.width  * (VW/zoom);
      panY -= dy / rect.height * (VH/zoom);
      lastTx = e.touches[0].clientX;
      lastTy = e.touches[0].clientY;
      applyTransform();
    }
    e.preventDefault();
  }, {passive: false});

  mapWrap.addEventListener('touchend', function(e) {
    if (e.touches.length < 2) lastDist = null;
    if (e.touches.length === 0) touching = false;
  });
})();
