<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GAIE 2026 · Hall 1</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg:      #f4f4f7;
  --surface: #ffffff;
  --border:  #e0e0ea;
  --text:    #1a1a2e;
  --muted:   #8888a8;
  --accent:  #5b4ee0;
  --accent2: #e05040;
  --panel-w: 280px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', system-ui, sans-serif;
}

/* ── LAYOUT ── */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  width: 100vw;
}

/* ── TOP STRIP ── */
#topbar { display: none; }
.brand-title {
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  color: var(--text);
  white-space: nowrap;
  flex-shrink: 0;
}
.brand-title span { color: var(--accent); }
.brand-sep {
  color: var(--border);
  font-size: 0.8rem;
  flex-shrink: 0;
}



/* Zone filter pills */
#zone-bar {
  height: 32px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 6px;
  overflow-x: auto;
  flex-shrink: 0;
  scrollbar-width: none;
}
#zone-bar::-webkit-scrollbar { display: none; }
.zpill {
  display: flex; align-items: center; gap: 5px;
  padding: 3px 10px;
  border-radius: 20px;
  border: 1px solid transparent;
  background: var(--bg);
  font-size: 0.63rem;
  font-weight: 500;
  color: var(--muted);
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
  flex-shrink: 0;
}
.zpill:hover { color: var(--text); border-color: var(--border); }
.zpill.active { color: var(--text); border-color: currentColor; }
.zpill .zdot {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}
.zpill-all {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 3px 10px;
  font-size: 0.63rem;
  font-weight: 600;
  color: var(--text);
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: all 0.15s;
}
.zpill-all:hover, .zpill-all.active { border-color: var(--accent); color: var(--accent); }

/* ── MAIN ── */
#main {
  flex: 1;
  position: relative;
  overflow: hidden;
}

/* ── MAP ── */
#map-wrap {
  position: absolute;
  inset: 0;
  cursor: grab;
  touch-action: none;
  user-select: none;
}
#map-wrap:active { cursor: grabbing; }
#map-svg { display: block; overflow: visible; }





/* ── ZOOM CONTROLS ── */
#zoom-ctrl {
  position: absolute;
  bottom: 16px; right: 16px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  z-index: 10;
}
.zb {
  width: 32px; height: 32px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--muted);
  font-size: 1rem;
  font-weight: 300;
  transition: all 0.15s;
}
.zb:hover { color: var(--text); border-color: var(--accent); }




</style>
</head>
<body>
<div id="app">

  <!-- SINGLE TOP STRIP -->
  <div id="zone-bar">
    <span class="brand-title">GAIE <span>2026</span></span>
    <span class="brand-sep">·</span>
    <button class="zpill-all active" onclick="filterZone(null, this)">All</button>
  </div>

  <!-- MAIN -->
  <div id="main">
    <div id="map-wrap">
      <svg id="map-svg"></svg>
    </div>

    <!-- Zoom controls -->
    <div id="zoom-ctrl">
      <button class="zb" onclick="doZoom(1.25)">+</button>
      <button class="zb" onclick="doZoom(0.8)">−</button>
      <button class="zb" title="Fit" onclick="fitView()" style="font-size:0.65rem;">⊞</button>
    </div>
  </div>
</div>

  pill.innerHTML = `<span class="zdot" style="background:${z.color}"></span>${z.en}`;

  pill.addEventListener('click', () => filterZone(z.color, pill));
  zbar.appendChild(pill);

function filterZone(color, el) {
  document.querySelectorAll('.zpill, .zpill-all').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  activeZoneColor = color;
  highlighted.clear();
  if (color) {
    BOOTHS.forEach(b => { if (b.color === color) highlighted.add(b.id); });
    resetBtn.classList.add('show');
  } else {
    resetBtn.classList.remove('show');
  }
  render();
}

function clearAll() {
  highlighted.clear();
  activeZoneColor = null;
  selectedBooth = null;
  closePanel();
  document.querySelectorAll('.zpill, .zpill-all').forEach(p => p.classList.remove('active'));
  document.querySelector('.zpill-all').classList.add('active');
  resetBtn.classList.remove('show');
  render();
}

function el(tag, attrs) {
  const e = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k,v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

function render() {
  svg.innerHTML = '';

  // Grid lines (subtle)
  for (let x = 0; x <= VW; x += 100) {
    svg.appendChild(el('line', {x1:x,y1:0,x2:x,y2:VH,stroke:'#e0e0ee','stroke-width':0.5}));
  }
  for (let y = 0; y <= VH; y += 80) {
    svg.appendChild(el('line', {x1:0,y1:y,x2:VW,y2:y,stroke:'#e0e0ee','stroke-width':0.5}));
  }

  svg.appendChild(el('rect', {x:0,y:0,width:VW,height:VH,fill:'#f8f7fc',stroke:'#d8d8e8','stroke-width':1}));

  hl.textContent = 'HALL 1';
  svg.appendChild(hl);

    const x2 = b.x2 / 100 * VW, y2 = b.y2 / 100 * VH;
    const w = x2 - x, h = y2 - y;
    const cx = x + w/2, cy = y + h/2;

    const isLit = highlighted.size === 0 || highlighted.has(b.id);
    const isDim = highlighted.size > 0 && !highlighted.has(b.id);

    const rect = el('rect', {
      x, y, width: Math.max(w,6), height: Math.max(h,6),
      fill:   isDim ? b.color+'0a' : b.color+'20',
      stroke: isDim ? b.color+'25' : b.color+'90',
      'stroke-width': highlighted.has(b.id) ? 1.5 : 0.8,

      rect.setAttribute('filter', `drop-shadow(0 0 4px ${b.color}88)`);
    }
    rect.style.cursor = 'pointer';
    rect.addEventListener('click', () => openPanel(b));
    rect.addEventListener('mouseenter', e => showTT(e, b));
    rect.addEventListener('mousemove', moveTT);
    rect.addEventListener('mouseleave', hideTT);
    svg.appendChild(rect);

    if (isDim) return; // skip labels when dimmed

    // ID label
    const idT = el('text', {x: x+2, y: y+5,
      'font-size': Math.min(h*0.13, 4.5),
      'font-family': 'DM Mono,Courier New,monospace',
      fill: '#aaaacc', opacity: 0.9});
    idT.style.pointerEvents = 'none';
    idT.textContent = b.id;
    svg.appendChild(idT);

    // ZH text
    const zhLines = b.zh.split('\n');
    const enLines = b.en.split('\n');
    const segH = Math.min(h / (zhLines.length + enLines.length + 0.5), h * 0.38);
    const zhFs = Math.min(segH*0.82, w*0.18, 7.5);
    const enFs = Math.min(segH*0.72, w*0.15, 6.5);
    const zhCy = cy - (enLines.length * enFs * 1.3)/2 - 1;
    const enCy = cy + (zhLines.length * zhFs * 1.3)/2 + 1;

    zhLines.forEach((line, i) => {
      const yPos = zhCy + (i - (zhLines.length-1)/2) * (zhFs*1.3);
      const t = el('text', {x: cx, y: yPos+zhFs*0.35,
        'text-anchor':'middle','dominant-baseline':'middle',
        'font-size': zhFs,'font-weight':700,
        'font-family':'DM Sans,Segoe UI,sans-serif',
        fill: b.color+'ee'});
      t.style.pointerEvents = 'none';
      t.textContent = line;
      svg.appendChild(t);
    });

    enLines.forEach((line, i) => {
      const yPos = enCy + (i - (enLines.length-1)/2) * (enFs*1.3);
      const t = el('text', {x: cx, y: yPos+enFs*0.35,
        'text-anchor':'middle','dominant-baseline':'middle',
        'font-size': enFs,
        'font-family':'DM Sans,Segoe UI,sans-serif',
        fill: '#6666aa'});
      t.style.pointerEvents = 'none';
      t.textContent = line;
      svg.appendChild(t);
    });
  });
}

// ── TRANSFORM ──
function p2v(clientX, clientY) {
  const r = mapWrap.getBoundingClientRect();
  return {
    x: (clientX - r.left) / r.width  * (VW/zoom) + panX,
    y: (clientY - r.top)  / r.height * (VH/zoom) + panY,
  };
}

function applyTransform() {
  const w = mapWrap.clientWidth;
  const h = mapWrap.clientHeight;
  svg.setAttribute('width',  w);
  svg.setAttribute('height', h);
  svg.setAttribute('viewBox', `${panX} ${panY} ${VW/zoom} ${VH/zoom}`);
}

function fitView() {
  const w = mapWrap.clientWidth;
  const h = mapWrap.clientHeight;
  // Scale to fill the viewport, keeping aspect ratio
  const scaleX = w / VW;
  const scaleY = h / VH;
  zoom = Math.min(scaleX, scaleY);
  panX = 0;
  panY = 0;
  applyTransform();
}

function doZoom(f) {
  const cx = panX + VW/zoom/2, cy = panY + VH/zoom/2;
  zoom = Math.max(0.5, Math.min(20, zoom * f));
  panX = cx - VW/zoom/2; panY = cy - VH/zoom/2;
  applyTransform();
}

function clampPan() {
  const maxX = VW - VW/zoom, maxY = VH - VH/zoom;
  panX = Math.max(0, Math.min(panX, maxX));
  panY = Math.max(0, Math.min(panY, maxY));
}

// ── MOUSE PAN/ZOOM ──
let dragging = false, dragStart = null, panStart = null;
mapWrap.addEventListener('mousedown', e => {
  dragging = true; dragStart = {x:e.clientX, y:e.clientY};
  panStart = {x:panX, y:panY};
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  const dx = (e.clientX - dragStart.x) / mapWrap.clientWidth  * (VW/zoom);
  const dy = (e.clientY - dragStart.y) / mapWrap.clientHeight * (VH/zoom);
  panX = panStart.x - dx; panY = panStart.y - dy;
  clampPan(); applyTransform();
});
window.addEventListener('mouseup', () => { dragging = false; });
mapWrap.addEventListener('wheel', e => {
  e.preventDefault();
  const f = e.deltaY < 0 ? 1.12 : 0.89;
  const mp = p2v(e.clientX, e.clientY);
  zoom = Math.max(0.5, Math.min(20, zoom * f));
  panX = mp.x - (e.clientX - mapWrap.getBoundingClientRect().left) / mapWrap.clientWidth * (VW/zoom);
  panY = mp.y - (e.clientY - mapWrap.getBoundingClientRect().top)  / mapWrap.clientHeight * (VH/zoom);
  clampPan(); applyTransform();
}, {passive:false});

// ── TOUCH ──
let lastDist = null, lastMidX, lastMidY, touchPanX, touchPanY;
mapWrap.addEventListener('touchstart', e => {
  if (e.touches.length===2) {
    lastDist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    lastMidX = (e.touches[0].clientX+e.touches[1].clientX)/2;
    lastMidY = (e.touches[0].clientY+e.touches[1].clientY)/2;
  } else if (e.touches.length===1) {
    touchPanX = e.touches[0].clientX; touchPanY = e.touches[0].clientY;
  }
  e.preventDefault();
},{passive:false});
mapWrap.addEventListener('touchmove', e => {
  const r = mapWrap.getBoundingClientRect();
  if (e.touches.length===2 && lastDist!==null) {
    const dist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    const midX = (e.touches[0].clientX+e.touches[1].clientX)/2;
    const midY = (e.touches[0].clientY+e.touches[1].clientY)/2;
    const mp = p2v(midX, midY);
    const f = dist/lastDist;
    zoom = Math.max(0.5, Math.min(20, zoom*f));
    panX = mp.x - (midX-r.left)/r.width*(VW/zoom);
    panY = mp.y - (midY-r.top)/r.height*(VH/zoom);
    panX -= (midX-lastMidX)/r.width*(VW/zoom);
    panY -= (midY-lastMidY)/r.height*(VH/zoom);
    lastDist=dist; lastMidX=midX; lastMidY=midY;
    clampPan(); applyTransform();
  } else if (e.touches.length===1) {
    const dx = (e.touches[0].clientX-touchPanX)/r.width*(VW/zoom);
    const dy = (e.touches[0].clientY-touchPanY)/r.height*(VH/zoom);
    panX -= dx; panY -= dy;
    touchPanX = e.touches[0].clientX; touchPanY = e.touches[0].clientY;
    clampPan(); applyTransform();
  }
  e.preventDefault();
},{passive:false});
mapWrap.addEventListener('touchend', e => { if(e.touches.length<2)lastDist=null; });

// ── INIT ──
function init() {
  svg.setAttribute('width',  mapWrap.clientWidth);
  svg.setAttribute('height', mapWrap.clientHeight);
  fitView();
  render();
}
window.addEventListener('resize', () => { fitView(); });
init();
</script>
</body>
</html>
